<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canvas — AirBrush</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/canvas.css"/>
</head>
<body class="canvas-body">

  <!-- ══════════════════ NAVBAR ══════════════════ -->
  <nav class="canvas-nav">
    <a href="index.html" class="nav-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="url(#navGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="navGrad" x1="2" y1="2" x2="22" y2="22">
            <stop offset="0%" stop-color="#7C3AED"/>
            <stop offset="100%" stop-color="#06B6D4"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="logo-text">✦ Air Canvas</span>
    </a>

    <div class="nav-user-badge">
      <span class="user-plus">+</span>
      <span id="nav-user">vb</span>
    </div>

    <div class="nav-right">
      <a href="canvas.html" class="nav-pill active">Canvas</a>
      <a href="gallery.html" class="nav-pill">My Gallery</a>
      <button class="nav-pill ghost" id="btn-logout">Sign Out</button>
    </div>
  </nav>

  <!-- ══════════════════ MAIN LAYOUT ══════════════════ -->
  <div class="canvas-main">

    <!-- ── LEFT SIDEBAR ── -->
    <aside class="canvas-sidebar">

      <!-- COLORS -->
      <div class="sb-section">
        <div class="sb-label">COLORS</div>
        <div class="color-swatches" id="color-swatches">
          <!-- Row 1 -->
          <div class="swatch active" data-color="#7C3AED" style="background:#7C3AED"></div>
          <div class="swatch" data-color="#06B6D4"  style="background:#06B6D4"></div>
          <div class="swatch" data-color="#F59E0B"  style="background:#F59E0B"></div>
          <div class="swatch" data-color="#10B981"  style="background:#10B981"></div>
          <div class="swatch" data-color="#EF4444"  style="background:#EF4444"></div>
          <!-- Row 2 -->
          <div class="swatch" data-color="#EC4899"  style="background:#EC4899"></div>
          <div class="swatch" data-color="#F97316"  style="background:#F97316"></div>
          <div class="swatch" data-color="#84CC16"  style="background:#84CC16"></div>
          <div class="swatch" data-color="#3B82F6"  style="background:#3B82F6"></div>
          <div class="swatch" data-color="#A855F7"  style="background:#A855F7"></div>
          <!-- Row 3 -->
          <div class="swatch" data-color="#FFFFFF"  style="background:#FFFFFF"></div>
          <div class="swatch" data-color="#9CA3AF"  style="background:#9CA3AF"></div>
          <div class="swatch" data-color="#6B7280"  style="background:#6B7280"></div>
          <div class="swatch" data-color="#374151"  style="background:#374151"></div>
          <div class="swatch" data-color="#000000"  style="background:#000000; border:1px solid #444"></div>
        </div>
        <input type="color" id="color-custom" value="#7C3AED" title="Custom colour" class="color-custom-input"/>
      </div>

      <!-- BRUSH SIZE -->
      <div class="sb-section">
        <div class="sb-label">BRUSH SIZE</div>
        <input type="range" id="brush-size" min="1" max="40" value="6" class="range-slider"/>
        <div class="range-val">Size: <span id="size-label">6</span></div>
      </div>

      <!-- OPACITY (hidden label, kept for JS) -->
      <span id="opacity-label" style="display:none">100</span>
      <input type="range" id="brush-opacity" min="10" max="100" value="100" style="display:none"/>

      <!-- MODE -->
      <div class="sb-section">
        <div class="sb-label">MODE</div>
        <button class="mode-pill active" id="btn-air-mode">
          <span class="mode-icon">✦</span> Air Draw
        </button>
        <button class="mode-pill" id="btn-mouse-mode">
          <span class="mode-icon">🖱</span> Mouse Draw
        </button>
        <button class="mode-pill" id="btn-eraser">
          <span class="mode-icon">⬜</span> Eraser
        </button>
        <!-- Hidden btn-brush needed by JS -->
        <button id="btn-brush" style="display:none"></button>
      </div>

      <!-- ACTIONS -->
      <div class="sb-section">
        <div class="sb-label">ACTIONS</div>
        <button class="action-pill" id="btn-undo">↩ Undo (or shake fist)</button>
        <button class="action-pill" id="btn-clear">🗑 Clear All</button>
        <button class="action-pill" id="btn-download">⬇ Save Image</button>
      </div>

      <!-- GESTURE GUIDE -->
      <div class="sb-section" id="gesture-guide">
        <div class="sb-label">GESTURES</div>
        <div class="gesture-row">👌 <span>Pinch = Draw</span></div>
        <div class="gesture-row">✌️ <span>2 fingers = Eraser</span></div>
        <div class="gesture-row">✊ <span>Fist shake = Undo</span></div>
        <div class="gesture-row">🖐 <span>Open palm = Stop</span></div>
      </div>

      <!-- STATUS -->
      <div class="sb-section">
        <div class="status-bar">
          <span class="status-dot loading" id="status-dot"></span>
          <span id="status-text" class="status-text">Loading…</span>
        </div>
      </div>

      <!-- CAMERA TOGGLE -->
      <div class="sb-section camera-row">
        <label class="camera-label">
          <input type="checkbox" id="camera-active-cb" checked/>
          <span class="cb-box"></span>
          Camera active
        </label>
      </div>

    </aside>

    <!-- ── CENTRE AREA ── -->
    <section class="canvas-area">

      <!-- Dual view: webcam + drawing canvas -->
      <div class="dual-view">

        <!-- Webcam panel -->
        <div class="cam-panel" id="cam-panel">
          <div class="live-badge">📷 LIVE HAND TRACKING</div>
          <div class="cam-frame">
            <video id="webcam" autoplay muted playsinline></video>
            <canvas id="overlay-canvas"></canvas>
            <div class="gesture-indicator" id="gesture-indicator"></div>
          </div>
          <div class="cam-controls">
            <button class="ctrl-btn green" id="btn-start">▶ Start</button>
            <button class="ctrl-btn red"   id="btn-stop" disabled>⏹ Stop</button>
          </div>
        </div>

        <!-- Drawing canvas panel -->
        <div class="draw-panel">
          <div class="draw-frame">
            <canvas id="draw-canvas"></canvas>
          </div>
        </div>

      </div>

      <!-- AI row -->
      <div class="ai-row">
        <div class="ai-input-wrap">
          <input type="text" id="ai-description" class="ai-input"
            placeholder="What did you draw? (or leave blank for AI to guess)"/>
          <button class="voice-btn" id="btn-voice" title="Voice input">
            🎤 <span class="voice-label">Voice</span>
          </button>
        </div>
        <button class="btn-generate" id="btn-generate">
          ✦ Generate Realistic Image
        </button>
      </div>

      <!-- AI Result (hidden until generated) -->
      <div class="ai-result-area" id="ai-result-area" style="display:none">
        <div class="ai-result-box" id="ai-result-box">
          <div class="ai-placeholder" id="ai-placeholder">
            <div class="ai-ph-icon">🎨</div>
            <p>Draw something and click <strong>Generate</strong></p>
          </div>
          <div class="ai-loading" id="ai-loading" style="display:none">
            <div class="ai-spinner"></div>
            <p id="ai-loading-text">Generating your art…</p>
          </div>
          <img id="ai-result-img" src="" alt="AI art" style="display:none"/>
        </div>
        <div class="ai-actions" id="ai-actions" style="display:none">
          <button class="action-pill" id="btn-save-ai">⬇ Save AI Art</button>
          <button class="action-pill" id="btn-retry-ai">🔄 Retry</button>
        </div>
        <div class="ai-settings">
          <select id="ai-model-select" class="model-select">
            <option value="stabilityai/stable-diffusion-xl-base-1.0">SD XL Base (best)</option>
            <option value="runwayml/stable-diffusion-v1-5">SD v1.5 (fast)</option>
            <option value="prompthero/openjourney">OpenJourney</option>
            <option value="dreamlike-art/dreamlike-photoreal-2.0">Dreamlike Photo</option>
          </select>
          <input type="password" id="hf-token" placeholder="HF Token (optional: hf_…)" class="token-input"/>
          <button class="action-pill" id="btn-save-token">Save Token</button>
        </div>
      </div>

    </section>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- MediaPipe CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="js/canvas.js"></script>

  <script>
    // Show AI result area when generate is clicked
    document.getElementById('btn-generate').addEventListener('click', () => {
      document.getElementById('ai-result-area').style.display = 'flex';
    }, { capture: true });

    // Camera active checkbox wires to Start/Stop
    document.getElementById('camera-active-cb').addEventListener('change', function() {
      if (this.checked) {
        document.getElementById('btn-start').click();
      } else {
        document.getElementById('btn-stop').click();
      }
    });

    // When Air Draw is clicked, also reset to brush tool
    document.getElementById('btn-air-mode').addEventListener('click', () => {
      document.getElementById('btn-brush').click();
    }, { capture: true });

    // When Mouse Draw is clicked, also reset to brush tool
    document.getElementById('btn-mouse-mode').addEventListener('click', () => {
      document.getElementById('btn-brush').click();
    }, { capture: true });

    // Update mode-pill active state when eraser is toggled
    const eraserBtn = document.getElementById('btn-eraser');
    const airBtn    = document.getElementById('btn-air-mode');
    const mouseBtn  = document.getElementById('btn-mouse-mode');

    const observer = new MutationObserver(() => {
      const isEraser = eraserBtn.classList.contains('active');
      if (isEraser) {
        airBtn.classList.remove('active');
        mouseBtn.classList.remove('active');
      }
    });
    observer.observe(eraserBtn, { attributes: true, attributeFilter: ['class'] });
  </script>
</body>
</html>
