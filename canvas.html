<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canvas — AirBrush</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/canvas.css"/>
  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head> <script src="js/canvas.js"></script>
<script src="js/ai-fix.js"></script>  
</body>

  
<body class="canvas-body">

  <!-- NAVBAR -->
  <nav class="canvas-nav">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="15" stroke="url(#cnlg1)" stroke-width="1.5"/>
          <path d="M8 22 Q12 10 16 14 Q20 18 24 8" stroke="url(#cnlg2)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <circle cx="24" cy="8" r="2.5" fill="url(#cnlg2)"/>
          <defs>
            <linearGradient id="cnlg1" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#7C3AED"/>
              <stop offset="100%" stop-color="#06B6D4"/>
            </linearGradient>
            <linearGradient id="cnlg2" x1="8" y1="22" x2="24" y2="8">
              <stop offset="0%" stop-color="#7C3AED"/>
              <stop offset="100%" stop-color="#06B6D4"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="logo-text">AirBrush</span>
    </a>
    <div class="nav-center">
      <div class="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Click Start to begin</span>
      </div>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user">👤 Guest</span>
      <a href="my-gallery.html" class="btn-nav-ghost" id="btn-open-gallery">My Gallery</a>
      <button class="btn-nav-ghost" id="btn-logout">Sign Out</button>
    </div>
  </nav>

  <!-- 3-COLUMN LAYOUT -->
  <div class="canvas-layout">

    <!-- LEFT PANEL -->
    <aside class="left-panel">
      <div class="panel-section">
        <div class="panel-label">MODE</div>
        <div class="mode-toggle">
          <button class="mode-btn active" id="btn-air-mode">✋ Air Draw</button>
          <button class="mode-btn" id="btn-mouse-mode">🖱 Mouse</button>
        </div>
      </div>
      <div class="panel-section">
        <div class="panel-label">TOOL</div>
        <div class="tool-row">
          <button class="tool-btn active" id="btn-brush">🖌 Brush</button>
          <button class="tool-btn" id="btn-eraser">⬜ Eraser</button>
        </div>
      </div>
      <div class="panel-section">
        <div class="panel-label">COLORS</div>
        <div class="swatch-grid">
          <div class="swatch active" data-color="#7C3AED" style="background:#7C3AED"></div>
          <div class="swatch" data-color="#06B6D4" style="background:#06B6D4"></div>
          <div class="swatch" data-color="#EC4899" style="background:#EC4899"></div>
          <div class="swatch" data-color="#F59E0B" style="background:#F59E0B"></div>
          <div class="swatch" data-color="#10B981" style="background:#10B981"></div>
          <div class="swatch" data-color="#EF4444" style="background:#EF4444"></div>
          <div class="swatch" data-color="#3B82F6" style="background:#3B82F6"></div>
          <div class="swatch" data-color="#F97316" style="background:#F97316"></div>
          <div class="swatch" data-color="#ffffff" style="background:#fff;border:1px solid rgba(255,255,255,0.25)"></div>
          <div class="swatch" data-color="#000000" style="background:#000"></div>
        </div>
        <input type="color" id="color-custom" value="#7C3AED" class="color-picker" title="Custom colour"/>
      </div>
      <div class="panel-section">
        <div class="panel-label">BRUSH SIZE — <span id="size-label">4</span></div>
        <input type="range" id="brush-size" min="1" max="60" value="4" class="slider"/>
      </div>
      <div class="panel-section">
        <div class="panel-label">OPACITY — <span id="opacity-label">100</span>%</div>
        <input type="range" id="brush-opacity" min="10" max="100" value="100" class="slider"/>
      </div>
      <div class="panel-section">
        <div class="panel-label">ACTIONS</div>
        <div class="action-stack">
          <button class="action-btn green" id="btn-start">▶ Start</button>
          <button class="action-btn red" id="btn-stop" disabled>■ Stop</button>
          <button class="action-btn" id="btn-undo">↩ Undo</button>
          <button class="action-btn" id="btn-clear">🗑 Clear</button>
          <button class="action-btn" id="btn-download">⬇ Save</button>
        </div>
      </div>
      <div class="panel-section" id="gesture-guide">
        <div class="panel-label">GESTURES</div>
        <div class="gesture-list">
          <div class="gesture-item"><span>👌</span><span>Pinch = Draw</span></div>
          <div class="gesture-item"><span>✌️</span><span>Peace = Eraser</span></div>
          <div class="gesture-item"><span>🖐</span><span>Palm = Stop</span></div>
        </div>
      </div>
    </aside>

    <!-- CENTRE: WEBCAM -->
    <div class="cam-panel" id="cam-panel">
      <div class="cam-panel-label">📷 Live Hand Tracking</div>
      <div class="cam-frame-box">
        <video id="webcam" autoplay muted playsinline></video>
        <canvas id="overlay-canvas"></canvas>
        <div class="gesture-indicator" id="gesture-indicator"></div>
      </div>
    </div>

    <!-- RIGHT: DRAW CANVAS + AI -->
    <div class="right-panel">
      <div class="draw-section">
        <div class="draw-label">🎨 Your Canvas</div>
        <div class="draw-frame-box">
          <canvas id="draw-canvas"></canvas>
        </div>
      </div>

      <div class="ai-section">
        <div class="desc-row">
          <textarea id="ai-description" class="ai-desc-input"
            placeholder="Describe your drawing for AI generation (or use 🎤 voice)…"
            rows="2"></textarea>
          <button class="voice-btn" id="btn-voice" title="Voice input">🎤</button>
        </div>

       <details class="ai-settings">
  <summary class="ai-settings-toggle">⚙️ AI Settings</summary>
  <div class="ai-settings-body">
    <div class="settings-row">
      <label>Style</label>
      <select id="ai-style-select" class="ai-select">
        <option value="digital art, highly detailed">Digital Art</option>
        <option value="oil painting, impressionist">Oil Painting</option>
        <option value="watercolor illustration">Watercolor</option>
        <option value="anime style, vibrant colors">Anime</option>
        <option value="photorealistic, 8k, HDR">Photorealistic</option>
        <option value="sketch, pencil drawing">Pencil Sketch</option>
        <option value="fantasy art, magical">Fantasy</option>
        <option value="cyberpunk, neon lights">Cyberpunk</option>
      </select>
    </div>
    <div class="settings-row">
      <label>Anthropic API Key <small>(for sketch reading — <a href="https://console.anthropic.com" target="_blank" style="color:#7C3AED">get one free</a>)</small></label>
      <div class="token-row">
        <input type="password" id="anthropic-key" placeholder="sk-ant-…" class="token-input"/>
        <button class="btn-save-token" id="btn-save-token">Save</button>
      </div>
    </div>
  </div>
</details>
        <button class="btn-generate" id="btn-generate">✨ Generate AI Art</button>

        <div class="ai-result-box">
          <div class="ai-placeholder" id="ai-placeholder">
            <span class="ai-placeholder-icon">🎨</span>
            <span>AI art will appear here</span>
          </div>
          <div class="ai-loading" id="ai-loading" style="display:none">
            <div class="ai-spinner"></div>
            <span id="ai-loading-text">Generating…</span>
          </div>
          <img id="ai-result-img" class="ai-result-img" style="display:none" alt="AI generated art"/>
          <div class="ai-actions" id="ai-actions" style="display:none">
            <button class="ai-action-btn" id="btn-save-ai">⬇ Save AI</button>
            <button class="ai-action-btn gallery-btn" id="btn-add-gallery">🖼 Add to Gallery</button>
            <button class="ai-action-btn" id="btn-retry-ai">🔄 Retry</button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /canvas-layout -->

  <!-- GALLERY MODAL -->
  <div class="gallery-modal" id="gallery-modal" style="display:none;">
    <div class="gallery-modal-inner">
      <div class="gallery-modal-header">
        <h2>🖼 My Gallery</h2>
        <button class="gallery-close" id="gallery-close">✕</button>
      </div>
      <div class="gallery-grid" id="gallery-grid">
        <div class="gallery-empty" id="gallery-empty">No images yet — generate some AI art!</div>
      </div>
    </div>
  </div>

  <script src="js/canvas.js"></script>
</body>
</html>
